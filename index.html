<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Sign Up</title>
    <link rel="stylesheet" href="./css/master.css">
</head>
<body>
    <div class="container">
        <!-- Card for Login/Sign Up -->
        <div class="card">
            <!-- Tab Buttons -->
            <div class="tab-buttons">
                <button id="signInTab" class="active">Sign In</button>
                <button id="signUpTab">Sign Up</button>
            </div>

            <!-- Sign In Form -->
            <form id="signInForm" class="form active">
                <h2>Welcome Back</h2>
                <input type="email" id="emailSignIn" placeholder="Email Address" required>
                <input type="password" id="passwordSignIn" placeholder="Password" required>
                <button type="submit">Sign In</button>
                <p class="form-footer">Don't have an account? <span id="switchToSignUp">Sign Up</span></p>
            </form>

            <!-- Sign Up Form -->
            <form id="signUpForm" class="form">
                <h2>Create Account</h2>
                <div class="form-group">
                    <input type="text" id="firstName" placeholder="First Name" required>
                    <input type="text" id="lastName" placeholder="Last Name" required>
                </div>
                <div class="form-group">
                    <select id="gender" required>
                        <option value="">Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                    <input type="date" id="birthday" required>
                </div>
                <input type="number" id="phone" placeholder="Phone Number" required>
                <input type="email" id="emailSignUp" placeholder="Email Address" required>
                <input type="password" id="passwordSignUp" placeholder="Password" required>
                <input type="password" id="repeatPassword" placeholder="Repeat Password" required>
                <button type="submit">Sign Up</button>
                <p class="form-footer">Already have an account? <span id="switchToSignIn">Sign In</span></p>
            </form>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
